server{
  listen 443 ssl;
  listen [::]:443 ssl;

  server_name www.adimas-d.42.fr adimas-d.42.fr;

  ssl_certificate /etc/ssl/certs/adimas-d.42.fr.crt;
  ssl_certificate_key /etc/ssl/private/adimas-d.42.fr.key;
  ssl_protocols TLSv1.3;

  root /var/www/html;
  index index.php;
  client_max_body_size 64M;

  location / {
	  try_files $uri $uri/ /index.php$is_args$args;
  }

  location ~ \.php$ {
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_pass	wordpress:9000;
	  fastcgi_index	index.php;
	  fastcgi_param	SCRIPT_FILENAME	$document_root$fastcgi_script_name;
	  fastcgi_param SCRIPT_NAME $fastcgi_script_name;
	  fastcgi_param	REQUEST_METHOD	$request_method;
	  include		fastcgi_params;
  } 

  # Adminer compatibility: handle /adminer, /adminer.php, and static assets
  location = /adminer {
    proxy_pass http://adminer:80/adminer.php;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location = /adminer.php {
    proxy_pass http://adminer:80/adminer.php;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location /adminer/ {
    proxy_pass http://adminer:80/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  
  location = /mailhog {
    return 301 /mailhog/;
  }

  location /mailhog/ {
    proxy_pass http://mailhog:8025/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # rewrite Location headers so redirects point to /mailhog/
    proxy_redirect http://mailhog:8025/ /mailhog/;
    proxy_redirect / /mailhog/;

    # try to rewrite absolute paths in HTML/JS so assets work under /mailhog/
    sub_filter_types text/html application/javascript text/css;
    sub_filter 'href="/' 'href="/mailhog/';
    sub_filter 'src="/' 'src="/mailhog/';
    sub_filter 'action="/' 'action="/mailhog/';
    sub_filter_once off;

    # streaming / buffering tweaks for dynamic UI
    proxy_buffering off;
    proxy_http_version 1.1;
  }

  location = /bonus {
    return 301 /bonus/;
  }

  # proxy to the internal Lighttpd container
  location /bonus/ {
    proxy_pass http://html:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header Content-Type;
    add_header Content-Type "text/html; charset=utf-8" always;
  }
}